<!DOCTYPE html>
<html>
<head>
  <title>Colspan and Rowspan Table</title>
</head>
<body>

<table border="10" cellpadding="30" cellspacing="10" style="color: brown;">
  <tr>
    <th rowspan="2">Name</th>
    <th rowspan="2">Interested Game</th>
    <th colspan="3">Performance</th>
  </tr>
  <tr>
    <th>Good</th>
    <th>Average</th >
    <th>Low</th>
  </tr>
  <tr>
    <td>kevin</td>
    <td>Freefire</td>
    <td>Good</td>
    <td></td>
    <td></td>
  </tr>
  <tr>
    <td>k7</td>
    <td>Pubg</td>
    <td></td>
    <td>Average</td>
    <td></td>
  </tr>
  <tr>
    <td>satheesh</td>
    <td>Call of duty</td>
    <td></td>
    <td></td>
    <td>Low</td>
  </tr>
</table>

</body>
</html>
