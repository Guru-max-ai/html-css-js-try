<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Started</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
    box-shadow: 0px 100px 40px;
      background:#ffda20;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card-box{
      display:flex;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      background:rgb(23, 183, 211);
    }
    .left-box{
      background:#17d148;
      padding:40px;
      width:250px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .right-box{
      padding:40px;
      width:300px;
    }
    .btn-primary{
      width:100%;
    }
  </style>
</head>
<body>

<div class="card-box">
  <div class="left-box text-center">
    <h5>Get started</h5>
    <p class="text-muted small">....create your account....</p>
  </div>

  <div class="right-box">
    <form>
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Full name">
      </div>
      <div class="mb-3">
        <input type="email" class="form-control" placeholder="Email">
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" placeholder="Password">
      </div>
      <button class="btn btn-primary">loginn</button>
    </form>
  </div>
</div>

</body>
</html>
