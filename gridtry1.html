<!DOCTYPE html>
<html>
<head>
<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
}

.container{
  display:grid;
  grid-template-areas:
    "header header header"
    "sidebar content content"
    "footer footer footer";
  grid-template-columns: 250px 1fr 1fr;
  grid-template-rows: 80px 1fr 60px;
  height:100vh;
  gap:10px;
  padding:10px;
  background: #111;
}

.header{
  grid-area: header;
  background: linear-gradient(45deg,#ff416c,#ff4b2b);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  border-radius:10px;
}

.sidebar{
  grid-area: sidebar;
  background: linear-gradient(45deg,#36d1dc,#5b86e5);
  color:white;
  padding:20px;
  border-radius:10px;
}

.content{
  grid-area: content;
  background: linear-gradient(45deg,#11998e,#38ef7d);
  color:white;
  padding:20px;
  border-radius:10px;
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:10px;
}

.card{
  background:white;
  color:#333;
  padding:20px;
  border-radius:8px;
  text-align:center;
  font-weight:bold;
}

.footer{
  grid-area: footer;
  background: linear-gradient(45deg,#8e2de2,#4a00e0);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
}

</style>
</head>
<body>

<div class="container">
  <div class="header">Header</div>
  <div class="sidebar"> Sidebar</div>

  <div class="content">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
    <div class="card">Card 4</div>
  </div>

  <div class="footer"> Footer</div>
</div>

</body>
</html>
